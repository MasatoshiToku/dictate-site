<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>決済完了 - Dictate</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white font-sans min-h-screen flex items-center justify-center px-4">
  <div class="max-w-md w-full text-center">
    <div class="bg-gray-900 rounded-2xl p-8 border border-gray-800">
      <div class="w-16 h-16 bg-green-900/50 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-8 h-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold mb-4">決済が完了しました</h1>
      <p class="text-gray-400 mb-6">使い放題プランへのお申し込みありがとうございます。</p>

      <div id="loading" class="mb-6">
        <p class="text-gray-400 text-sm">APIキーを取得中...</p>
      </div>

      <div id="api-key-section" class="hidden mb-6">
        <p class="text-sm text-gray-400 mb-3">あなたのAPIキー:</p>
        <div class="flex items-center gap-2 bg-gray-800 rounded-lg p-3 border border-gray-700">
          <code id="api-key" class="flex-1 text-sm text-purple-400 break-all text-left"></code>
          <button id="copy-btn" class="flex-shrink-0 bg-gray-700 hover:bg-gray-600 text-white text-xs font-medium px-3 py-1.5 rounded transition-colors">
            コピー
          </button>
        </div>
        <p class="mt-4 text-sm text-gray-400 leading-relaxed">
          このAPIキーをDictateアプリのSettings画面に入力してください。
        </p>
      </div>

      <div id="error-section" class="hidden mb-6">
        <p class="text-red-400 text-sm">APIキーの取得に失敗しました。しばらく待ってからページを再読み込みしてください。</p>
      </div>

      <a href="/" class="inline-block text-purple-400 hover:text-purple-300 text-sm transition-colors">トップページに戻る</a>
    </div>
  </div>

  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');
      if (!sessionId) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error-section').classList.remove('hidden');
        return;
      }
      try {
        const res = await fetch('/api/verify-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId }),
        });
        const data = await res.json();
        document.getElementById('loading').classList.add('hidden');
        if (data.api_key) {
          document.getElementById('api-key').textContent = data.api_key;
          document.getElementById('api-key-section').classList.remove('hidden');
        } else {
          document.getElementById('error-section').classList.remove('hidden');
        }
      } catch (e) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error-section').classList.remove('hidden');
      }
    })();

    document.getElementById('copy-btn').addEventListener('click', () => {
      const key = document.getElementById('api-key').textContent;
      navigator.clipboard.writeText(key).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'コピー済み';
        setTimeout(() => { btn.textContent = 'コピー'; }, 2000);
      });
    });
  </script>
</body>
</html>
