<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>特定商取引法に基づく表記 - Dictate</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white font-sans">
  <nav class="sticky top-0 z-50 bg-gray-950/80 backdrop-blur-md border-b border-gray-800">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="/" class="text-xl font-bold bg-gradient-to-r from-purple-400 to-blue-400 bg-clip-text text-transparent">Dictate</a>
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-4 py-12">
    <h1 class="text-3xl font-bold mb-8">特定商取引法に基づく表記</h1>
    <div class="bg-gray-900 rounded-xl border border-gray-800 overflow-hidden">
      <table class="w-full text-sm">
        <tbody>
          <tr class="border-b border-gray-800">
            <th class="text-left p-4 bg-gray-800/50 text-gray-300 font-medium w-1/3">販売業者</th>
            <td class="p-4 text-gray-300">[要設定]</td>
          </tr>
          <tr class="border-b border-gray-800">
            <th class="text-left p-4 bg-gray-800/50 text-gray-300 font-medium">代表者</th>
            <td class="p-4 text-gray-300">[要設定]</td>
          </tr>
          <tr class="border-b border-gray-800">
            <th class="text-left p-4 bg-gray-800/50 text-gray-300 font-medium">所在地</th>
            <td class="p-4 text-gray-300">[要設定]</td>
          </tr>
          <tr class="border-b border-gray-800">
            <th class="text-left p-4 bg-gray-800/50 text-gray-300 font-medium">連絡先</th>
            <td class="p-4 text-gray-300">[要設定]</td>
          </tr>
          <tr class="border-b border-gray-800">
            <th class="text-left p-4 bg-gray-800/50 text-gray-300 font-medium">販売価格</th>
            <td class="p-4 text-gray-300">使い放題プラン: 1,000円/月（税込）</td>
          </tr>
          <tr class="border-b border-gray-800">
            <th class="text-left p-4 bg-gray-800/50 text-gray-300 font-medium">支払方法</th>
            <td class="p-4 text-gray-300">クレジットカード（Stripe経由）</td>
          </tr>
          <tr class="border-b border-gray-800">
            <th class="text-left p-4 bg-gray-800/50 text-gray-300 font-medium">支払時期</th>
            <td class="p-4 text-gray-300">お申し込み時に初回決済、以降毎月自動更新</td>
          </tr>
          <tr class="border-b border-gray-800">
            <th class="text-left p-4 bg-gray-800/50 text-gray-300 font-medium">サービス提供時期</th>
            <td class="p-4 text-gray-300">決済完了後、即時</td>
          </tr>
          <tr>
            <th class="text-left p-4 bg-gray-800/50 text-gray-300 font-medium">返品・解約</th>
            <td class="p-4 text-gray-300">いつでも解約可能です。解約後は当月末までサービスをご利用いただけます。日割り返金はいたしません。</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <footer class="border-t border-gray-800 py-6 px-4">
    <div class="max-w-3xl mx-auto text-center text-sm text-gray-600">
      &copy; 2026 Dictate. All rights reserved.
    </div>
  </footer>
</body>
</html>
